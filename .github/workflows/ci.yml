name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest tests/ --cov=my_calculator --cov-report=xml --cov-report=term-missing -v

      - name: Run pylint
        run: pylint my_calculator/ --fail-under=7.0

      - name: Generate badge manually
        run: |
          pip install lxml
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib['line-rate']) * 100
          color = 'brightgreen' if pct >= 90 else 'yellow' if pct >= 70 else 'red'
          svg = f'''<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"120\" height=\"20\">
            <rect width=\"63\" height=\"20\" fill=\"#555\"/>
            <rect x=\"63\" width=\"57\" height=\"20\" fill=\"{color}\"/>
            <text x=\"31\" y=\"14\" fill=\"white\" font-size=\"11\" text-anchor=\"middle\">coverage</text>
            <text x=\"91\" y=\"14\" fill=\"white\" font-size=\"11\" text-anchor=\"middle\">{pct:.0f}%</text>
          </svg>'''
          open('coverage.svg', 'w').write(svg)
          print(f'Coverage: {pct:.0f}%')
          "

      - name: Save badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: badge жаңартылды [skip ci]"
          file_pattern: coverage.svg
